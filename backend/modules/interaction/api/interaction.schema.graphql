type Mutation {
  likePost(postId: ID!): Boolean!
  unlikePost(postId: ID!): Boolean!
  viewPost(postId: ID!): Boolean!
  commentPost(postId: ID!, content: String!): Boolean!
}

type Query {
  postLikes(postId: ID!): [PostLike!]!
  postComments(postId: ID!): [Comment!]!
  myInteractionHistory: InteractionHistory!
}

type InteractionHistory {
  likedPosts: [Post!]!
  commentedPosts: [Post!]!
}

type Post {
  id: ID!
  userId: String!
  content: String!
  likeCount: Int!
  commentCount: Int!
  viewCount: Int!
  isLiked: Boolean!
  categoryTags: [String!]!
  createdAt: String!
  user: User
}

type PostLike {
  id: ID!
  userId: String!
  postId: String!
  createdAt: String!
  user: LikeUser
}

type Comment {
  id: ID!
  postId: String!
  userId: String!
  content: String!
  createdAt: String!
  user: CommentUser
}

type LikeUser {
  id: ID!
  email: String!
}

type CommentUser {
  id: ID!
  email: String!
}
